<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kado Spesial - Happy Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LAYAR KADO (muncul pertama) -->
    <div class="gift-screen" id="giftScreen">
        <div class="gift" id="giftIcon">🎁</div>
        <div class="gift-text">✨ from me for my bb ✨
            <br>
            <span style="font-size: 0.75rem;">made with ❤️, 🤖, and ☕</span>
        </div>
    </div>

    <!-- HALAMAN UTAMA (lilin + interaksi) -->
    <div class="main-container" id="mainContainer">
        <div class="candle-container" id="candleMain">
            <div class="ambient-glow"></div>
            <div class="candle-body">
                <div class="wick"></div>
                <div class="flame" id="flameEl"></div>
                <div class="inner-flame" id="innerFlameEl"></div>
            </div>
        </div>
        <div class="caramel-drip"></div>
        <img src="gambar1.png" id="dragImage">
        <div id="hintBox">🔥 Drag me to the candle! 🔥</div>
    </div>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-container">
            <div class="loading-icon">🎁</div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text" id="loadingText">Loading assets... 0%</div>
            <div class="loading-detail" id="loadingDetail">Preparing your gift...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
